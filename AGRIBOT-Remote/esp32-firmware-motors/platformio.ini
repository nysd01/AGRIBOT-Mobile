[env:esp32dev]
platform = espressif32
board    = esp32dev
framework = arduino
monitor_speed = 115200

; ── Set this to your ESP32-Motors COM port (different from Sensors COM37) ──
upload_port  = COM47
upload_speed = 115200
upload_resetmethod = nodemcu

; ── Use min_spiffs partition: gives 1.875 MB app space (default 1.3 MB is too small) ──
; BluetoothSerial + WiFi + MQTT + WebServer push the binary to ~1.5 MB
board_build.partitions = min_spiffs.csv

; ── Libraries ──────────────────────────────────────────────────────────────
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  adafruit/Adafruit NeoPixel @ ^1.12.3
  knolleary/PubSubClient @ ^2.8

; Disable Bluetooth to free ~70 KB heap for WiFiClientSecure TLS operations
build_flags = -DCONFIG_BT_ENABLED=0 -DCONFIG_BLUEDROID_ENABLED=0

build_src_filter = +<main.cpp>
