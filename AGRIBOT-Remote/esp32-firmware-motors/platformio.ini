[env:esp32dev]
platform = espressif32
board    = esp32dev
framework = arduino
monitor_speed = 115200

; ── Set this to your ESP32-Motors COM port (different from Sensors COM37) ──
upload_port  = COM46
upload_speed = 115200
upload_resetmethod = nodemcu

; ── Use min_spiffs partition: gives 1.875 MB app space (default 1.3 MB is too small) ──
; BluetoothSerial + WiFi + MQTT + WebServer push the binary to ~1.5 MB
board_build.partitions = min_spiffs.csv

; ── Libraries ──────────────────────────────────────────────────────────────
lib_deps =
  bblanchon/ArduinoJson @ ^7.0.4
  adafruit/Adafruit NeoPixel @ ^1.12.3
  knolleary/PubSubClient @ ^2.8
  h2zero/NimBLE-Arduino @ ^1.4.3

; NimBLE (not Bluedroid) — peripheral-only BLE GATT server for the offline
; phone↔Motors remote-control fallback. NimBLE uses ~20-30 KB heap vs.
; Bluedroid's ~70 KB, so it coexists with WiFiClientSecure's TLS buffers.
; Disabling the central/observer roles (phone is the central, ESP32 is the
; peripheral) and capping connections trims RAM further.
build_flags =
  -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
  -DCONFIG_BT_NIMBLE_ROLE_CENTRAL_DISABLED
  -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED

build_src_filter = +<main.cpp>
