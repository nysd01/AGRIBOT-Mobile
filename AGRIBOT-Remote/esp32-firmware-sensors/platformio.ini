[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_port = COM37

; ── Auto-upload (no BOOT button needed) ──────────────────────
upload_speed = 921600
upload_resetmethod = nodemcu

; ── Libraries ────────────────────────────────────────────────
lib_deps =
  adafruit/DHT sensor library @ ^1.4.6
  adafruit/Adafruit Unified Sensor @ ^1.1.14
  mikalhart/TinyGPSPlus @ ^1.0.3
  bblanchon/ArduinoJson @ ^7.0.4

; ── TFT_eSPI Display Config (ST7735, 128x160, SPI) ───────────
build_flags =
  -DUSER_SETUP_LOADED=1
  -DST7735_DRIVER=1
  -DTFT_WIDTH=128
  -DTFT_HEIGHT=160
  -DTFT_MOSI=13
  -DTFT_SCLK=14
  -DTFT_CS=15
  -DTFT_DC=27
  -DTFT_RST=26
  -DTFT_BL=32
  -DLOAD_GLCD=1
  -DLOAD_FONT2=1
  -DLOAD_FONT4=1
  -DLOAD_FONT6=1
  -DLOAD_FONT7=1
  -DLOAD_FONT8=1
  -DLOAD_GFXFF=1
  -DSMOOTH_FONT=1
  -DSPI_FREQUENCY=27000000