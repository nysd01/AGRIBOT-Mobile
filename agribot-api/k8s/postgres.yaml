# PostgreSQL: Secret + persistent storage + Deployment + Service (service discovery).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: agribot
type: Opaque
stringData:
  POSTGRES_USER: agribot
  POSTGRES_PASSWORD: agribot
  POSTGRES_DB: agribot
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: agribot
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: agribot
spec:
  replicas: 1
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16
          envFrom:
            - secretRef: { name: postgres-secret }
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgres-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres           # ← the API reaches the DB by this DNS name (service discovery)
  namespace: agribot
spec:
  selector: { app: postgres }
  ports:
    - port: 5432
      targetPort: 5432
