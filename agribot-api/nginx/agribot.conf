# AGRIBOT reverse proxy (rubric §1) — dedicated public entry point in front of the API.
# TLS terminates here; the API stays private on localhost:18080.
#
# This VPS already hosts other Nginx sites on 443, so AGRIBOT uses its own TLS
# port 8443 to avoid clashing with them. The ESP32 sensor node posts to
# https://<host>:8443/api/readings (self-signed cert OK; firmware uses setInsecure()).

server {
    listen 8443 ssl;
    server_name _;

    # Self-signed cert (generated in the README). Swap for Let's Encrypt if you have a domain.
    ssl_certificate     /etc/nginx/ssl/agribot.crt;
    ssl_certificate_key /etc/nginx/ssl/agribot.key;

    # Proxy everything to the API stack on the host.
    location / {
        proxy_pass         http://127.0.0.1:18080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
