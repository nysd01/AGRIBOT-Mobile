# AGRIBOT reverse proxy (rubric §1) — single public entry point in front of the API.
# TLS terminates here; the API stays private on localhost:18080.
# The ESP32 sensor node posts to https://<host>/api/readings (self-signed cert OK,
# firmware uses setInsecure()).

# Redirect plain HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    # Self-signed cert (generated in the README). Swap for Let's Encrypt if you have a domain.
    ssl_certificate     /etc/nginx/ssl/agribot.crt;
    ssl_certificate_key /etc/nginx/ssl/agribot.key;

    # Proxy everything to the API container/stack on the host.
    location / {
        proxy_pass         http://127.0.0.1:18080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
