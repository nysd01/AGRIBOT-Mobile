# AGRI-PC Mosquitto — TWO listeners so both the robot and the phone can connect:
#   1883  TCP        → ESP32-Motors (raw MQTT)
#   9001  WebSocket  → phone app (MQTT over WebSocket; the app can't do raw TCP)
#
# Both listeners share the same topics (e.g. agribot/motors/cmd, agribot/sensors).
#
# Run:  mosquitto -c mosquitto.conf -v
# (On Windows, point the installed Mosquitto service at this file, or run the exe
#  directly with -c.)

listener 1883
protocol mqtt

listener 9001
protocol websockets

# LAN-only broker on the robot — anonymous is fine. Lock down later if needed.
allow_anonymous true
